{% extends "base.html" %}

{% block title %}Admin Dashboard - Elektro{% endblock %}

{% block content %}

<div class="container-fluid py-5 bg-light">
    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="mb-4">Admin Irányítópult</h1>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div>
                                <h6 class="text-muted mb-0">Termékek</h6>
                                <h3 class="text-primary">{{ products_count }}</h3>
                            </div>
                            <div class="ms-auto">
                                <i class="fas fa-box fa-3x text-primary opacity-10"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div>
                                <h6 class="text-muted mb-0">Felhasználók</h6>
                                <h3 class="text-success">{{ users_count }}</h3>
                            </div>
                            <div class="ms-auto">
                                <i class="fas fa-users fa-3x text-success opacity-10"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div>
                                <h6 class="text-muted mb-0">Megrendelések</h6>
                                <h3 class="text-warning">{{ orders_count }}</h3>
                            </div>
                            <div class="ms-auto">
                                <i class="fas fa-shopping-cart fa-3x text-warning opacity-10"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Admin Menu -->
        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Rendszerkezelés</h5>
                        <div class="row g-3">
                            <div class="col-md-6 col-lg-4">
                                <a href="{{ url_for('admin_products') }}" class="btn btn-primary w-100 py-3">
                                    <i class="fas fa-list me-2"></i> Termékek kezelése
                                </a>
                            </div>
                            <div class="col-md-6 col-lg-4">
                                <a href="{{ url_for('add_product') }}" class="btn btn-success w-100 py-3">
                                    <i class="fas fa-plus me-2"></i> Új termék
                                </a>
                            </div>
                            <div class="col-md-6 col-lg-4">
                                <a href="{{ url_for('home') }}" class="btn btn-secondary w-100 py-3">
                                    <i class="fas fa-home me-2"></i> Weboldal
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
